<html>
<head>
  <title>Live Giving Overlay</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    .overlay {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .title {
      font-size: 1.5em;
      color: #fff;
      opacity: 0.8;
    }

    .amount {
      font-size: 2.5em;
      color: #00ffcc;
      margin: 5px 0;
    }

    .bar-container {
      width: 100%;
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffcc, #00ffaa);
      transition: width 0.6s ease;
    }

    .pulse {
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="title">LIVE GIVING</div>
  <div class="amount" id="amount">R0</div>
