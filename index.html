<html> 
<head>
<meta charset="UTF-8">
<title>Finansiële Impak</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: 'Segoe UI', sans-serif;
}

/* MAIN PANEL */
.overlay {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  padding: 25px 35px;

  background: rgba(20, 20, 20, 0.85);
  backdrop-filter: blur(10px);

  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.12);
}

/* TOP BRANDING ROW */
.branding-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.main-graphic {
  height: 60px; /* Adjust based on preference */
}

.sponsor-logos {
  height: 40px; /* Adjust based on preference */
  opacity: 0.9;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  align-items: center;
}

/* LEFT */
.left {
  text-align: left;
}

.title {
  font-size: 0.95em;
  font-weight: bold;
  letter-spacing: 2px;
  color: #2ed1a2; /* Themed to match the bar */
}

.subtitle {
  font-size: 0.8em;
  color: #999;
}

/* CENTER */
.center {
  text-align: center;
}

.amount {
  font-size: 3em;
  font-weight: 700;
  color: white;
  text-shadow: 0 0 15px rgba(46, 209, 162, 0.3);
}

/* RIGHT */
.right {
  text-align: right;
}

.qr img {
  width: 85px;
  border-radius: 4px;
  background: white; /* Contrast for scanning */
  padding: 3px;
}

.qr span {
  display: block;
  font-size: 0.7em;
  color: #ccc;
  margin-top: 5px;
}

/* BAR */
.bar-container {
  margin-top: 20px;
  width: 100%;
  height: 14px;
  background: rgba(255,255,255,0.1);
  border-radius: 7px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #2ed1a2, #23a07c);
  transition: width 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 0.8em;
  color: #aaa;
}

.pulse {
  animation: pulse 0.4s ease;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.015); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="overlay" id="overlay">

  <div class="branding-header">
    <img src="main_page.png" alt="Gholfdag" class="main-graphic">
    <img src="inpas_aim_logos.png" alt="Sponsors" class="sponsor-logos">
  </div>

  <div class="grid">

    <div class="left">
      <div class="title">FINANSIËLE IMPAK</div>
      <div class="subtitle">Deursigtigheid • Vertroue • Groei</div>
    </div>

    <div class="center">
      <div class="amount" id="amount">R0 ingesamel</div>
    </div>

    <div class="right">
      <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=YOUR_YOCO_LINK_HERE">
        <span>Skandeer om by te dra</span>
      </div>
    </div>

  </div>

  <div class="bar-container">
    <div class="bar" id="bar"></div>
  </div>

  <div class="footer">
    <div>Regstreekse opdatering</div>
    <div id="target">Teikenbedrag: R50 000</div>
  </div>

</div>

<script>
const goal = 50000;
let current = 0;

const evtSource = new EventSource('/events');

evtSource.onmessage = function(event) {
  const data = JSON.parse(event.data);

  if (data.total !== current) {
    current = data.total;

    document.getElementById('amount').innerText =
      'R' + current.toLocaleString('en-ZA') + ' ingesamel';

    const percent = Math.min((current / goal) * 100, 100);
    document.getElementById('bar').style.width = percent + '%';

    const overlay = document.getElementById('overlay');
    overlay.classList.add('pulse');
    setTimeout(() => overlay.classList.remove('pulse'), 400);
  }
};
</script>

</body>
</html>
